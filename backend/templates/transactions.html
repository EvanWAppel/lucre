{% extends "base.html" %}
{% block title %}Transactions — Lucre{% endblock %}
{% block nav %}
<nav>
  <a href="/" class="nav-link">Dashboard</a>
  <a href="/spending" class="nav-link">Spending</a>
</nav>
{% endblock %}
{% block content %}
<h1>Transactions</h1>

<form method="get" action="/transactions" class="filters">
  <input type="month" name="month" value="{{ filters.month or '' }}">
  <select name="account_id">
    <option value="">All accounts</option>
    {% for account in accounts %}
    <option value="{{ account.id }}" {% if filters.account_id == account.id %}selected{% endif %}>
      {{ account.name }}
    </option>
    {% endfor %}
  </select>
  <select name="category">
    <option value="">All categories</option>
    {% for cat in categories %}
    <option value="{{ cat }}" {% if filters.category == cat %}selected{% endif %}>{{ cat }}</option>
    {% endfor %}
  </select>
  <button type="submit">Filter</button>
  <a href="/transactions" class="clear">Clear</a>
</form>

<table class="transactions">
  <tbody id="txn-body">
    {% include "_transaction_rows.html" %}
  </tbody>
</table>
{% endblock %}
