{# Whole-cell fragment: also the PATCH response, so it must stay a single <td>. #}
<td class="txn-category" id="cat-{{ txn.id }}">
  <select name="category"
          hx-patch="/api/transactions/{{ txn.id }}/category"
          hx-target="#cat-{{ txn.id }}"
          hx-swap="outerHTML"
          hx-trigger="change"
          hx-include="#applyall-{{ txn.id }}">
    <option value="" {% if not txn.user_category %}selected{% endif %}>
      {{ txn.plaid_category or "Uncategorized" }}{% if not txn.user_category %} (auto){% endif %}
    </option>
    {% for cat in categories %}
    {% if cat != "Uncategorized" %}
    <option value="{{ cat }}" {% if txn.user_category == cat %}selected{% endif %}>{{ cat }}</option>
    {% endif %}
    {% endfor %}
  </select>
  <label class="apply-all" title="Apply to all transactions from this merchant">
    <input type="checkbox" id="applyall-{{ txn.id }}" name="apply_to_merchant"> all
  </label>
</td>
